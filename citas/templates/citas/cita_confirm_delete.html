{% extends 'citas/base.html' %}

{% block content %}
<h2>Eliminar Cita</h2>
<p>¿Deseas eliminar esta cita de "{{ object.mascota.nombre }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<a href="{% url 'cita_list' %}">Cancelar</a>
{% endblock %}
